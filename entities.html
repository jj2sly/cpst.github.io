<!DOCTYPE html>
<html>
<head>
    <title>Corn Planet Entity Database</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <a href="admin.html" class="adminLink">ADMIN</a>
    <h1>CORN PLANET ENTITY DATABASE</h1>
    <p>SECURE • STUDY • DOCUMENT</p>
</header>
<div class="warning">
    ACCESS LEVEL 2 REQUIRED
</div>
<a href="classification.html" class="backBtn">VIEW CLASSIFICATION SYSTEM</a>
<a href="index.html" class="backBtn">⬅ BACK TO HOME</a>
    <div class="database">
  <h2>Entity Index</h2>

  <label for="sortSelect" style="color:#ffd400; font-weight:bold; margin-right:8px;">Sort by:</label>
  <select id="sortSelect">
      <option value="id">ID Number</option>
      <option value="titleAsc">Title (A–Z)</option>
      <option value="titleDesc">Title (Z–A)</option>
      <option value="classification">Classification</option>
  </select>

  <br><br>

  <div id="container"><p class="loadingText">DECRYPTING DATABASE...</p></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
  authDomain: "cpo-9af17.firebaseapp.com",
  projectId: "cpo-9af17",
  storageBucket: "cpo-9af17.firebasestorage.app",
  messagingSenderId: "526427336111",
  appId: "1:526427336111:web:8b71369117416ae937d35a"
};
    const container = document.getElementById("container");
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadClassificationColors() {
      const colorMap = {};
      try {
          const querySnapshot = await getDocs(collection(db, "classifications"));
          querySnapshot.forEach((docSnap) => {
              const data = docSnap.data();
              const name = (data.name || docSnap.id).toUpperCase();
              colorMap[name] = data.color || "#ffd400";
          });
      } catch (err) {
          console.warn("Could not load classification colors:", err);
      }
      return colorMap;
  }

  async function loadEntries() {
  const colorMap = await loadClassificationColors();
  const querySnapshot = await getDocs(collection(db, "entities"));
  console.log("ENTRIES FOUND:", querySnapshot.size);

  if (!querySnapshot.size) {
    container.innerHTML = "<p>No entities found in database.</p>";
    return;
  }

  let items = [];
  querySnapshot.forEach((docSnap) => {
      const data = docSnap.data();
      items.push({
          id: docSnap.id,
          title: data.title || "UNTITLED ENTITY",
          classification: (data.classification || "UNKNOWN").toString()
      });
  });

  function render(sortMode) {
      let sorted = items.slice();

      if (sortMode === "titleAsc") {
          sorted.sort((a, b) => a.title.localeCompare(b.title));
      } else if (sortMode === "titleDesc") {
          sorted.sort((a, b) => b.title.localeCompare(a.title));
      } else if (sortMode === "classification") {
          sorted.sort((a, b) => a.classification.localeCompare(b.classification));
      } else {
          // Default: ID number
          sorted.sort((a, b) => a.id.localeCompare(b.id, undefined, { numeric: true }));
      }

      container.innerHTML = "";
      sorted.forEach((item) => {
          const div = document.createElement("div");
          div.className = "entry";
          const upperClass = item.classification.toUpperCase();
          const color = colorMap[upperClass] || "#888";
          div.innerHTML = `
            <a href="entry.html?id=${item.id}">${item.title}</a>
            <span class="class" style="background:${color}; color:#000;">${item.classification}</span>
          `;
          container.appendChild(div);
      });
  }

  render("id");

  document.getElementById("sortSelect").addEventListener("change", (e) => {
      render(e.target.value);
  });
}
  loadEntries();
</script>
</body>
</html>
