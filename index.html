<!DOCTYPE html>
<html>
<head>
    <title>Corn Planet Entity Database</title>
    <link rel="stylesheet" href="style.css">
    <a href="admin.html">ADMIN PANEL</a>
</head>
<body>

<header>
    <h1>CORN PLANET ENTITY DATABASE</h1>
    <p>SECURE • STUDY • DOCUMENT</p>
</header>

<div class="warning">
    ACCESS LEVEL 2 REQUIRED
</div>

<div class="legend">
    <h3>CLASSIFICATION</h3>
    <p><span class="class cosmic">COSMIC</span> — Reality-altering entities</p>
    <p><span class="class earthly">EARTHLY</span> — Major threats</p>
    <p><span class="class local">LOCAL</span> — Limited influence</p>
    <p><span class="class seldom">CONSTRICTED</span> — Controlled anomalies</p>
    <p><span class="class neutralized">NEUTRALIZED</span> — Deceased/Irrelevant anomalies</p>
</div>

<div class="database">
    <h2>Entity Index</h2>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
  authDomain: "cpo-9af17.firebaseapp.com",
  projectId: "cpo-9af17",
  storageBucket: "cpo-9af17.firebasestorage.app",
  messagingSenderId: "526427336111",
  appId: "1:526427336111:web:8b71369117416ae937d35a"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadEntries() {
    const querySnapshot = await getDocs(collection(db, "entities"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "entry";

      div.innerHTML = `
        <a href="entry.html?id=${doc.id}">${data.title}</a>
        <span class="class ${data.classification.toLowerCase()}">${data.classification}</span>
      `;

      container.appendChild(div);
    });
  }

  loadEntries();
</script>
</body>
</html>
