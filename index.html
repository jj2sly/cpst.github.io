<!DOCTYPE html>
<html>
<head>
    <title>CPST Database</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="admin.html" class="adminLink">ADMIN</a>

<div id="gateOverlay">
    <div id="gateContent">
        <h1 id="gateTitle">CPST DATABASE</h1>
        <p id="gateSubtitle">RESTRICTED ACCESS TERMINAL</p>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="mainContent" style="display:none;">

<header>
    <h1>CPST DATABASE</h1>
    <p>SECURE. CONTAIN. PROTECT.</p>
</header>

<div class="warning">
    AUTHORIZED PERSONNEL ONLY
</div>

<div class="database">
    <div class="entry">
        <a href="classification.html">CLASSIFICATIONS</a>
        <span>&rarr;</span>
    </div>
    <div class="entry">
        <a href="entities.html">ENTITIES</a>
        <span>&rarr;</span>
    </div>
    <div class="entry">
        <a href="artifacts.html">ARTIFACTS</a>
        <span>&rarr;</span>
    </div>
</div>

</div>

<script>
const overlay = document.getElementById("gateOverlay");
const main = document.getElementById("mainContent");

// If already entered this session, skip the gate entirely
if (sessionStorage.getItem("cpstEntered") === "true") {
    overlay.style.display = "none";
    main.style.display = "block";
} else {
    document.getElementById("enterBtn").addEventListener("click", () => {
        sessionStorage.setItem("cpstEntered", "true");

        overlay.classList.add("gate-exit");

        main.style.display = "block";
        main.classList.add("content-enter");

        setTimeout(() => {
            overlay.style.display = "none";
        }, 700);
    });
}
</script>

</body>
</html>
