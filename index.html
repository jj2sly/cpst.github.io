<!DOCTYPE html>
<html>
<head>
    <title>CPST Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gateOverlay">
    <div id="gateContent">
        <h1 id="gateTitle">CPST DATABASE</h1>
        <p id="gateSubtitle">RESTRICTED ACCESS TERMINAL</p>
        <button id="enterBtn">ENTER</button>
    </div>
</div>

<div id="mainContent" style="display:none;">

<header>
    <h1>CPST DATABASE</h1>
    <p>SECURE. CONTAIN. PROTECT.</p>
</header>

<div class="warning">
    AUTHORIZED PERSONNEL ONLY
</div>

<div class="database">
    <div class="entry">
        <a href="classifications.html">CLASSIFICATIONS</a>
        <span>&rarr;</span>
    </div>
    <div class="entry">
        <a href="entities.html">ENTITIES</a>
        <span>&rarr;</span>
    </div>
    <div class="entry">
        <a href="artifacts.html">ARTIFACTS</a>
        <span>&rarr;</span>
    </div>
</div>

</div>

<script>
document.getElementById("enterBtn").addEventListener("click", () => {
    const overlay = document.getElementById("gateOverlay");
    const main = document.getElementById("mainContent");

    overlay.classList.add("gate-exit");

    main.style.display = "block";
    main.classList.add("content-enter");

    setTimeout(() => {
        overlay.style.display = "none";
    }, 700);
});
</script>

</body>
</html>
