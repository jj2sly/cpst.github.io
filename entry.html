<!DOCTYPE html>
<html>
<head>
    <title>Entity File</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="title">LOADING...</h1>
    <p id="classTag">CLASSIFICATION: ...</p>
    <p id="containmentTag">CONTAINMENT: ...</p>
</header>

    <h2>DESCRIPTION</h2>
<textarea id="description" readonly></textarea>
    
<h2>CONTAINMENT PROCEDURES</h2>
<textarea id="containmentProcedures" readonly></textarea>

<h2>ADDENDUM</h2>
<textarea id="addendum" readonly></textarea>

<button id="editBtn">EDIT FILE</button>
<button id="deleteBtn">DELETE FILE</button>

<p id="status"></p>
    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { setPersistence, browserLocalPersistence } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "cpo-9af17.firebaseapp.com",
    projectId: "cpo-9af17",
    storageBucket: "cpo-9af17.firebasestorage.app",
    messagingSenderId: "526427336111",
    appId: "1:526427336111:web:8b71369117416ae937d35a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Get ID from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let editing = false;
document.getElementById("editBtn").style.display = "none";
document.getElementById("deleteBtn").style.display = "none";

/* =========================
   AUTH CHECK (ONE ONLY)
========================= */
onAuthStateChanged(auth, (user) => {
    console.log("AUTH STATE:", user);

    const editBtn = document.getElementById("editBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    const description = document.getElementById("description");
    const containment = document.getElementById("containmentProcedures");
    const addendum = document.getElementById("addendum");

    if (user) {

        editBtn.style.display = "inline-block";
        deleteBtn.style.display = "inline-block";

        description.readOnly = true;
        containment.readOnly = true;
        addendum.readOnly = true;

        document.getElementById("status").textContent = "";

    } else {

        sessionStorage.setItem("redirectAfterLogin", window.location.href);

        editBtn.style.display = "none";
        deleteBtn.style.display = "none";

        description.readOnly = true;
        containment.readOnly = true;
        addendum.readOnly = true;

        document.getElementById("status").textContent =
            "ACCESS LEVEL REQUIRED TO EDIT";
    }

});
/* =========================
   LOAD ENTRY
========================= */
async function loadEntry() {

    const docRef = doc(db, "entities", id);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
        document.getElementById("title").textContent = "ENTITY NOT FOUND";
        return;
    }

    const data = docSnap.data();

    document.getElementById("title").textContent =
        data.title || "UNTITLED ENTITY";

    document.getElementById("classTag").textContent =
        "CLASSIFICATION: " + (data.classification || "UNKNOWN");

    document.getElementById("containmentTag").textContent =
        "CONTAINMENT: " + (data.containment || "UNKNOWN");

    document.getElementById("description").value =
        data.description || "";

    document.getElementById("containmentProcedures").value =
        data.containmentProcedures || "";

    document.getElementById("addendum").value =
        data.addendum || "";
}

loadEntry();

/* =========================
   EDIT / SAVE
========================= */
document.getElementById("editBtn").addEventListener("click", async () => {

    const description = document.getElementById("description");
    const containment = document.getElementById("containmentProcedures");
    const addendum = document.getElementById("addendum");

    if (!editing) {

        description.readOnly = false;
        containment.readOnly = false;
        addendum.readOnly = false;

        document.getElementById("editBtn").textContent =
            "SAVE CHANGES";

        editing = true;
        return;
    }

    await updateDoc(doc(db, "entities", id), {
        description: description.value,
        containmentProcedures: containment.value,
        addendum: addendum.value
    });

    description.readOnly = true;
    containment.readOnly = true;
    addendum.readOnly = true;

    document.getElementById("editBtn").textContent =
        "EDIT FILE";

    document.getElementById("status").textContent =
        "Changes saved successfully.";

    editing = false;
});

/* =========================
   DELETE
========================= */
document.getElementById("deleteBtn").addEventListener("click", async () => {

    const confirmed = confirm(
        "TERMINATION PROTOCOL\n\nDelete this CPE permanently?"
    );

    if (!confirmed) return;

    await deleteDoc(doc(db, "entities", id));

});
</script>

</body>
</html>
