<!DOCTYPE html>
<html>
<head>
    <title>Entity File</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="title">LOADING...</h1>
    <p id="classTag">CLASSIFICATION: ...</p>
    <p id="containmentTag">CONTAINMENT: ...</p>
</header>

    <h2>DESCRIPTION</h2>
<div id="descriptionView" class="entryText"></div>
<textarea id="descriptionEdit" class="entryText" style="display:none;"></textarea>
    
<h2>CONTAINMENT PROCEDURES</h2>
<div id="containmentView" class="entryText"></div>
<textarea id="containmentEdit" class="entryText" style="display:none;"></textarea>

<h2>ADDENDUM</h2>
<div id="addendumView" class="entryText"></div>
<textarea id="addendumEdit" class="entryText" style="display:none;"></textarea>

<button id="editBtn">EDIT FILE</button>
<button id="deleteBtn">DELETE FILE</button>

<a href="index.html" class="backBtn">⬅ BACK TO DATABASE</a>

<p id="status"></p>
    
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
    authDomain: "cpo-9af17.firebaseapp.com",
    projectId: "cpo-9af17",
    storageBucket: "cpo-9af17.firebasestorage.app",
    messagingSenderId: "526427336111",
    appId: "1:526427336111:web:8b71369117416ae937d35a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Get ID from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let isEditMode = false;

/* =========================
   AUTH CHECK
========================= */
onAuthStateChanged(auth, (user) => {
    const editBtn = document.getElementById("editBtn");
    const deleteBtn = document.getElementById("deleteBtn");

    if (user) {
        editBtn.style.display = "inline-block";
        deleteBtn.style.display = "inline-block";
    } else {
        editBtn.style.display = "none";
        deleteBtn.style.display = "none";

        document.getElementById("status").textContent =
            "ACCESS LEVEL REQUIRED TO EDIT";
    }
});

/* =========================
   LOAD ENTRY
========================= */
async function loadEntry() {
    const docRef = doc(db, "entities", id);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
        document.getElementById("title").textContent = "ENTITY NOT FOUND";
        return;
    }

    const data = docSnap.data();

    document.getElementById("title").textContent =
        data.title || "UNTITLED ENTITY";

    document.getElementById("classTag").textContent =
        "CLASSIFICATION: " + (data.classification || "UNKNOWN");

    document.getElementById("containmentTag").textContent =
        "CONTAINMENT: " + (data.containment || "UNKNOWN");

   document.getElementById("descriptionView").innerHTML =
    data.description || "NO DATA LOADED";

    document.getElementById("containmentView").innerHTML =
        applyRedactions(data.containmentProcedures || "");

    document.getElementById("addendumView").innerHTML =
        applyRedactions(data.addendum || "");

    document.getElementById("descriptionEdit").value =
        data.description || "";

    document.getElementById("containmentEdit").value =
        data.containmentProcedures || "";

    document.getElementById("addendumEdit").value =
        data.addendum || "";
}

/* =========================
   MODE TOGGLE
========================= */
function toggleMode() {
    isEditMode = !isEditMode;

    const viewIds = ["descriptionView", "containmentView", "addendumView"];
    const editIds = ["descriptionEdit", "containmentEdit", "addendumEdit"];

    viewIds.forEach(id => {
        document.getElementById(id).style.display =
            isEditMode ? "none" : "block";
    });

    editIds.forEach(id => {
        document.getElementById(id).style.display =
            isEditMode ? "block" : "none";
    });

    document.getElementById("editBtn").textContent =
        isEditMode ? "SAVE CHANGES" : "EDIT FILE";
}

/* =========================
   EDIT / SAVE BUTTON
========================= */
document.getElementById("editBtn").addEventListener("click", async () => {

    if (!isEditMode) {
        toggleMode();
        return;
    }

    await updateDoc(doc(db, "entities", id), {
        description: document.getElementById("descriptionEdit").value,
        containmentProcedures: document.getElementById("containmentEdit").value,
        addendum: document.getElementById("addendumEdit").value
    });

    document.getElementById("status").textContent =
        "Changes saved successfully.";

    toggleMode();
});

/* =========================
   DELETE BUTTON
========================= */
document.getElementById("deleteBtn").addEventListener("click", async () => {

    const confirmed = confirm(
        "TERMINATION PROTOCOL\n\nDelete this CPE permanently?"
    );

    if (!confirmed) return;

    await deleteDoc(doc(db, "entities", id));

    document.getElementById("status").textContent =
        "Entity deleted.";
});

/* =========================
   REDACTIONS
========================= */
function applyRedactions(text) {
    text = text.replace(/\/r!!(.*?)\/r!!/g,
        `<span class="redacted-cosmic">████ COSMIC ERASED ████</span>`
    );

    text = text.replace(/\/r!(.*?)\/r!/g,
        `<span class="redacted-heavy">██ CLASSIFIED ██</span>`
    );

    text = text.replace(/\/r(.*?)\/r/g,
        `<span class="redacted-normal">███ REDACTED ███</span>`
    );

    return text;
}

/* =========================
   INIT
========================= */
loadEntry();

    let isEditMode = false;

document.getElementById("modeBtn").addEventListener("click", () => {

    isEditMode = !isEditMode;

    const view = ["descriptionView","containmentView","addendumView"];
    const edit = ["descriptionEdit","containmentEdit","addendumEdit"];

    view.forEach(id => {
        document.getElementById(id).style.display =
            isEditMode ? "none" : "block";
    });

    edit.forEach(id => {
        document.getElementById(id).style.display =
            isEditMode ? "block" : "none";
    });

    document.getElementById("modeBtn").textContent =
        isEditMode ? "SWITCH TO VIEW MODE" : "SWITCH TO EDIT MODE";
});
/* =========================
   EDIT / SAVE
========================= */
document.getElementById("editBtn").addEventListener("click", async () => {
    <button id="modeBtn">SWITCH TO EDIT MODE</button>
    const description = document.getElementById("description");
    const containment = document.getElementById("containmentProcedures");

        description.readOnly = false;
        containment.readOnly = false;
        addendum.readOnly = false;

        editing = true;
        return;
    }

   document.getElementById("editBtn").addEventListener("click", async () => {

    await updateDoc(doc(db, "entities", id), {
        description: document.getElementById("descriptionEdit").value,
        containmentProcedures: document.getElementById("containmentEdit").value,
        addendum: document.getElementById("addendumEdit").value

    document.getElementById("status").textContent =
        "Changes saved successfully.";
});
});

    description.readOnly = true;
    containment.readOnly = true;
    addendum.readOnly = true;

    document.getElementById("editBtn").textContent =
        "EDIT FILE";

    document.getElementById("status").textContent =
        "Changes saved successfully.";

    editing = false;
});

/* =========================
   DELETE
========================= */
document.getElementById("deleteBtn").addEventListener("click", async () => {

    const confirmed = confirm(
        "TERMINATION PROTOCOL\n\nDelete this CPE permanently?"
    );

    if (!confirmed) return;

    await deleteDoc(doc(db, "entities", id));

});
</script>

</body>
</html>
