<!DOCTYPE html>
<html>
<head>
    <title>Corn Planet Artifact Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <a href="admin.html">ADMIN PANEL</a>
    <h1>CORN PLANET ARTIFACT DATABASE</h1>
    <p>SECURE • STUDY • DOCUMENT</p>
</header>
<div class="warning">
    ACCESS LEVEL 2 REQUIRED
</div>
<a href="classification.html" class="backBtn">VIEW CLASSIFICATION SYSTEM</a>
<a href="index.html" class="backBtn">⬅ BACK TO HOME</a>
    <div class="database">
  <h2>Artifact Index</h2>
  <div id="container"></div>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  const firebaseConfig = {
  apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
  authDomain: "cpo-9af17.firebaseapp.com",
  projectId: "cpo-9af17",
  storageBucket: "cpo-9af17.firebasestorage.app",
  messagingSenderId: "526427336111",
  appId: "1:526427336111:web:8b71369117416ae937d35a"
};
    const container = document.getElementById("container");
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadClassificationColors() {
      const colorMap = {};
      const querySnapshot = await getDocs(collection(db, "classifications"));
      querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const name = (data.name || docSnap.id).toUpperCase();
          colorMap[name] = data.color || "#ffd400";
      });
      return colorMap;
  }

  async function loadEntries() {
  const colorMap = await loadClassificationColors();
  const querySnapshot = await getDocs(collection(db, "artifacts"));
  console.log("ARTIFACTS FOUND:", querySnapshot.size);
  if (!querySnapshot.size) {
    container.innerHTML = "<p>No artifacts found in database.</p>";
    return;
  }
  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const div = document.createElement("div");
    div.className = "entry";
    const title = data.title || "UNTITLED ARTIFACT";
    const classification = (data.classification || "UNKNOWN").toString();
    const upperClass = classification.toUpperCase();
    const color = colorMap[upperClass] || "#888";
    div.innerHTML = `
      <a href="artifact-entry.html?id=${docSnap.id}">${title}</a>
      <span class="class" style="background:${color}; color:#000;">${classification}</span>
    `;
    container.appendChild(div);
  });
}
  loadEntries();
</script>
</body>
</html>
