<!DOCTYPE html>
<html>
<head>
    <title>Classification System</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>CLASSIFICATION SYSTEM</h1>
    <p>THREAT LEVEL REFERENCE</p>
</header>

<div class="legend">
    <h3>CLASSIFICATION</h3>
    <div id="classList">Loading...</div>
</div>

<a href="index.html" class="backBtn">⬅ BACK TO HOME</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
    authDomain: "cpo-9af17.firebaseapp.com",
    projectId: "cpo-9af17",
    storageBucket: "cpo-9af17.firebasestorage.app",
    messagingSenderId: "526427336111",
    appId: "1:526427336111:web:8b71369117416ae937d35a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadClassifications() {
    const listDiv = document.getElementById("classList");

    try {
        const querySnapshot = await getDocs(collection(db, "classifications"));

        if (querySnapshot.empty) {
            listDiv.innerHTML = "<p>No classifications have been defined yet.</p>";
            return;
        }

        let items = [];
        let rawIndex = 0;
        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            items.push({
                name: data.name || docSnap.id,
                color: data.color || "#ffd400",
                description: data.description || "",
                order: typeof data.order === "number" ? data.order : null,
                fallbackIndex: rawIndex
            });
            rawIndex++;
        });

        items.sort((a, b) => {
            const orderA = a.order !== null ? a.order : 1000 + a.fallbackIndex;
            const orderB = b.order !== null ? b.order : 1000 + b.fallbackIndex;
            return orderA - orderB;
        });

        listDiv.innerHTML = "";

        items.forEach((item) => {
            const p = document.createElement("p");
            p.innerHTML = `
                <span class="class" style="background:${item.color}; color:#000;">${item.name}</span>
                ${item.description ? " — " + item.description : ""}
            `;
            listDiv.appendChild(p);
        });
    } catch (err) {
        console.error("Could not load classifications:", err);
        listDiv.innerHTML = "<p>Unable to load classifications. Check console for details.</p>";
    }
}

loadClassifications();
</script>

</body>
</html>
