<!DOCTYPE html>
<html>
<head>
    <title>CPE Admin Panel</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>CPE ADMIN PANEL</h1>
    <p>AUTHORIZED PERSONNEL ONLY</p>
</header>

<a href="index.html" class="backBtn">⬅ BACK TO HOME</a>
<br><br>

<div class="tabBar">
    <button class="tabBtn active" data-tab="entityPanel">CREATE ENTITY</button>
    <button class="tabBtn" data-tab="classPanel">CLASSIFICATIONS</button>
    <button class="tabBtn" data-tab="artifactPanel">CREATE ARTIFACT</button>
</div>

<div class="file" id="entityPanel">

    <h2>Create New Entity</h2>

    <input id="docId" placeholder="Auto-generating..." disabled>

    <input id="title" placeholder="Title"><br><br>

    <select id="classification">
    <option value="COSMIC">COSMIC</option>
    <option value="EARTHLY">EARTHLY</option>
    <option value="LOCAL">LOCAL</option>
    <option value="CONSTRICTED">CONSTRICTED</option>
    <option value="NEUTRALIZED">NEUTRALIZED</option>
</select>
<br><br>

    <select id="containment">
    <option value="MINIMAL">MINIMAL</option>
    <option value="STANDARD">STANDARD</option>
    <option value="ENHANCED">ENHANCED</option>
    <option value="MAXIMUM">MAXIMUM</option>
    <option value="TERMINATION">TERMINATION</option>
</select>
<br><br>

    <textarea id="description" placeholder="Description"></textarea>

    <textarea id="containmentProcedures" placeholder="Containment Procedures"></textarea>

    <textarea id="addendum" placeholder="Addendum"></textarea>

    <button id="submitBtn">Create Entity</button>

    <p id="status"></p>

</div>

<div class="file" id="classPanel">

    <h2>Manage Classifications</h2>

    <div id="classificationList"></div>

    <h3>Add New Classification</h3>

    <input id="newClassName" placeholder="Classification name (e.g. ANOMALOUS)">
    <br><br>
    <input id="newClassDescription" placeholder="Short description (e.g. Reality-altering entities)">
    <br><br>
    <label for="newClassColor" style="color:#ffd400; font-weight:bold;">Color:</label>
    <input type="color" id="newClassColor" value="#ffd400">
    <br><br>
    <button id="addClassBtn">Add Classification</button>

    <p id="classStatus"></p>

</div>

<div class="file" id="artifactPanel">

    <h2>Create New Artifact</h2>

    <input id="artDocId" placeholder="Auto-generating..." disabled>

    <input id="artTitle" placeholder="Artifact Title"><br><br>

    <select id="artClassification">
        <!-- populated dynamically from classifications collection -->
    </select>
    <br><br>

    <textarea id="artProperties" placeholder="Properties / Object Class"></textarea>

    <textarea id="artDescription" placeholder="Description"></textarea>

    <textarea id="artContainmentProcedures" placeholder="Containment / Handling Procedures"></textarea>

    <textarea id="artAddendum" placeholder="Addendum"></textarea>

    <button id="artSubmitBtn">Create Artifact</button>

    <p id="artStatus"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    updateDoc,
    deleteDoc,
    getDoc,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBshT0wE2kjCIPpt1BozZvLlY3kGwWEH90",
  authDomain: "cpo-9af17.firebaseapp.com",
  projectId: "cpo-9af17",
  storageBucket: "cpo-9af17.firebasestorage.app",
  messagingSenderId: "526427336111",
  appId: "1:526427336111:web:8b71369117416ae937d35a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "login.html"; }
});

/* =========================
   ENTITY CREATION
========================= */

async function generateNextCPE() {
    const querySnapshot = await getDocs(collection(db, "entities"));

    let max = 0;

    querySnapshot.forEach((docSnap) => {
        const id = docSnap.id;
        const match = id.match(/CPE-(\d+)/);
        if (match) {
            const num = parseInt(match[1], 10);
            if (num > max) max = num;
        }
    });

    const next = max + 1;
    return "CPE-" + String(next).padStart(3, "0");
}

window.addEventListener("load", async () => {
    const nextId = await generateNextCPE();
    document.getElementById("docId").value = nextId;
});

document.getElementById("submitBtn").addEventListener("click", async () => {

    const docId = document.getElementById("docId").value;

    const newData = {
        title: document.getElementById("title").value,
        classification: document.getElementById("classification").value,
        containment: document.getElementById("containment").value,
        description: document.getElementById("description").value,
        containmentProcedures: document.getElementById("containmentProcedures").value,
        addendum: document.getElementById("addendum").value,
        logs: [
            {
                date: new Date().toLocaleString(),
                message: "Entity file created."
            }
        ]
    };

    await setDoc(doc(db, "entities", docId), newData);

    document.getElementById("status").textContent =
        "Entity successfully created.";

    // Clear the form
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("containmentProcedures").value = "";
    document.getElementById("addendum").value = "";

    // Generate the next ID immediately after submit
    const nextId = await generateNextCPE();
    document.getElementById("docId").value = nextId;
});

/* =========================
   CLASSIFICATION MANAGEMENT
========================= */

function classNameToDocId(name) {
    return name.trim().toUpperCase().replace(/\s+/g, "_");
}

async function loadClassifications() {
    const listDiv = document.getElementById("classificationList");
    const artClassSelect = document.getElementById("artClassification");

    listDiv.innerHTML = "Loading...";

    const querySnapshot = await getDocs(collection(db, "classifications"));

    if (querySnapshot.empty) {
        listDiv.innerHTML = "<p>No classifications yet. Add one below.</p>";
        artClassSelect.innerHTML = "";
        return;
    }

    // Collect into an array so we can sort by order
    let items = [];
    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        items.push({
            id: docSnap.id,
            name: data.name || docSnap.id,
            color: data.color || "#ffd400",
            description: data.description || "",
            order: typeof data.order === "number" ? data.order : 9999
        });
    });

    items.sort((a, b) => a.order - b.order);

    listDiv.innerHTML = "";
    artClassSelect.innerHTML = "";

    items.forEach((item, index) => {
        // Row in management list
        const row = document.createElement("div");
        row.className = "entry";
        row.innerHTML = `
            <div class="reorderBtns">
                <button data-id="${item.id}" data-index="${index}" class="moveUpBtn" ${index === 0 ? "disabled" : ""}>▲</button>
                <button data-id="${item.id}" data-index="${index}" class="moveDownBtn" ${index === items.length - 1 ? "disabled" : ""}>▼</button>
            </div>
            <span class="class" style="background:${item.color}; color:#000;">${item.name}</span>
            <input type="text" value="${item.description}" data-id="${item.id}" class="classDescInput" placeholder="Description" style="flex:1; min-width:150px;">
            <input type="color" value="${item.color}" data-id="${item.id}" class="classColorInput">
            <button data-id="${item.id}" class="saveClassBtn">SAVE</button>
            <button data-id="${item.id}" class="deleteClassBtn">DELETE</button>
        `;
        listDiv.appendChild(row);

        // Option in artifact classification dropdown
        const opt = document.createElement("option");
        opt.value = item.name;
        opt.textContent = item.name;
        artClassSelect.appendChild(opt);
    });

    // Wire up save buttons
    document.querySelectorAll(".saveClassBtn").forEach((btn) => {
        btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const colorInput = document.querySelector(`.classColorInput[data-id="${id}"]`);
            const descInput = document.querySelector(`.classDescInput[data-id="${id}"]`);
            const newColor = colorInput.value;
            const newDesc = descInput.value;

            await updateDoc(doc(db, "classifications", id), {
                color: newColor,
                description: newDesc
            });

            document.getElementById("classStatus").textContent =
                `Updated ${id}.`;

            loadClassifications();
        });
    });

    // Wire up delete buttons
    document.querySelectorAll(".deleteClassBtn").forEach((btn) => {
        btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");

            const confirmed = confirm(`Delete classification "${id}"? This cannot be undone.`);
            if (!confirmed) return;

            await deleteDoc(doc(db, "classifications", id));

            document.getElementById("classStatus").textContent =
                `Deleted ${id}.`;

            loadClassifications();
        });
    });

    // Wire up reorder buttons
    document.querySelectorAll(".moveUpBtn").forEach((btn) => {
        btn.addEventListener("click", async () => {
            const index = parseInt(btn.getAttribute("data-index"), 10);
            if (index === 0) return;
            await swapOrder(items[index], items[index - 1]);
        });
    });

    document.querySelectorAll(".moveDownBtn").forEach((btn) => {
        btn.addEventListener("click", async () => {
            const index = parseInt(btn.getAttribute("data-index"), 10);
            if (index === items.length - 1) return;
            await swapOrder(items[index], items[index + 1]);
        });
    });
}

async function swapOrder(itemA, itemB) {
    // Normalize order values (in case of ties/defaults) then swap them
    const orderA = itemA.order;
    const orderB = itemB.order;

    await updateDoc(doc(db, "classifications", itemA.id), { order: orderB });
    await updateDoc(doc(db, "classifications", itemB.id), { order: orderA });

    loadClassifications();
}

document.getElementById("addClassBtn").addEventListener("click", async () => {
    const nameInput = document.getElementById("newClassName");
    const descInput = document.getElementById("newClassDescription");
    const colorInput = document.getElementById("newClassColor");

    const name = nameInput.value.trim().toUpperCase();
    const description = descInput.value.trim();
    const color = colorInput.value;

    if (!name) {
        document.getElementById("classStatus").textContent =
            "Please enter a classification name.";
        return;
    }

    const docId = classNameToDocId(name);

    // Figure out the next order number (append to the end of the list)
    const existing = await getDocs(collection(db, "classifications"));
    let maxOrder = -1;
    existing.forEach((docSnap) => {
        const data = docSnap.data();
        const ord = typeof data.order === "number" ? data.order : 0;
        if (ord > maxOrder) maxOrder = ord;
    });

    await setDoc(doc(db, "classifications", docId), {
        name: name,
        description: description,
        color: color,
        order: maxOrder + 1
    });

    document.getElementById("classStatus").textContent =
        `Classification "${name}" added.`;

    nameInput.value = "";
    descInput.value = "";
    colorInput.value = "#ffd400";

    loadClassifications();
});

/* =========================
   ARTIFACT CREATION
========================= */

async function generateNextART() {
    const querySnapshot = await getDocs(collection(db, "artifacts"));

    let max = 0;

    querySnapshot.forEach((docSnap) => {
        const id = docSnap.id;
        const match = id.match(/ART-(\d+)/);
        if (match) {
            const num = parseInt(match[1], 10);
            if (num > max) max = num;
        }
    });

    const next = max + 1;
    return "ART-" + String(next).padStart(3, "0");
}

async function refreshArtDocId() {
    const nextId = await generateNextART();
    document.getElementById("artDocId").value = nextId;
}

document.getElementById("artSubmitBtn").addEventListener("click", async () => {

    const docId = document.getElementById("artDocId").value;

    const newData = {
        title: document.getElementById("artTitle").value,
        classification: document.getElementById("artClassification").value,
        properties: document.getElementById("artProperties").value,
        description: document.getElementById("artDescription").value,
        containmentProcedures: document.getElementById("artContainmentProcedures").value,
        addendum: document.getElementById("artAddendum").value,
        logs: [
            {
                date: new Date().toLocaleString(),
                message: "Artifact file created."
            }
        ]
    };

    await setDoc(doc(db, "artifacts", docId), newData);

    document.getElementById("artStatus").textContent =
        "Artifact successfully created.";

    document.getElementById("artTitle").value = "";
    document.getElementById("artProperties").value = "";
    document.getElementById("artDescription").value = "";
    document.getElementById("artContainmentProcedures").value = "";
    document.getElementById("artAddendum").value = "";

    refreshArtDocId();
});

/* =========================
   TAB SWITCHING
========================= */

document.querySelectorAll(".tabBtn").forEach((btn) => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".tabBtn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".file").forEach((panel) => panel.style.display = "none");

        btn.classList.add("active");
        document.getElementById(btn.getAttribute("data-tab")).style.display = "block";
    });
});

// Show only the first panel by default, hide the rest
document.querySelectorAll(".file").forEach((panel, index) => {
    panel.style.display = index === 0 ? "block" : "none";
});

/* =========================
   START
========================= */

loadClassifications();
refreshArtDocId();

</script>

</body>
</html>
